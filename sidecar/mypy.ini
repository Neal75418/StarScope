[mypy]
python_version = 3.12
# Phase 1: 啟用基礎檢查（不要求所有函式都有 type hint，但檢查已有的）
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = False
ignore_missing_imports = True
# Phase 2（未來）：啟用 strict_optional 和 disallow_untyped_defs

# 排除所有 alembic 目錄
exclude = alembic/

# 第三方套件忽略
[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True
